name: CI

on:
  push:
  pull_request:

jobs:
  platformio:
    name: PlatformIO CI
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - example: examples/Boards_Bluetooth/Adafruit_Bluefruit_LE
            extra_args: "--board=uno"
          - example: examples/Boards_Bluetooth/Adafruit_Feather_32u4_BLE
            extra_args: "--board=feather32u4 --project-option='lib_deps=SoftwareSerial'"
          - example: examples/Boards_Bluetooth/Arduino_101_BLE
            extra_args: "--board=genuino101"
          - example: examples/Boards_Bluetooth/BBC_MicroBit
            extra_args: "--board=uno --project-option='lib_deps=SPI'"
          - example: examples/Boards_Bluetooth/DFRobot_Bluno_BLE_Link
            extra_args: "--board=leonardo"
          - example: examples/Boards_Bluetooth/LightBlue_Bean
            extra_args: "--board=lightblue-bean"
          - example: examples/Boards_Bluetooth/Microduino_BLE
            extra_args: "--board=leonardo"
          - example: examples/Boards_Bluetooth/RedBearLab_BLE_Mini
            extra_args: "--board=leonardo"
          - example: examples/Boards_Bluetooth/RedBearLab_BlendMicro
            extra_args: "--board=blendmicro8"
          - example: examples/Boards_Bluetooth/Serial_HC05_HC06
            extra_args: "--board=uno"
          - example: examples/Boards_Bluetooth/Serial_HM10_HC08
            extra_args: "--board=leonardo"
          - example: examples/Boards_Bluetooth/nRF8001
            extra_args: "--board=uno"
          - example: examples/Boards_Ethernet/Arduino_Ethernet
            extra_args: "--board=uno"
          - example: examples/Boards_Ethernet/Arduino_Ethernet_Manual
            extra_args: "--board=uno"
          - example: examples/Boards_Ethernet/ENC28J60
            extra_args: "--board=nanoatmega328"
          - example: examples/Boards_Ethernet/Energia_Ethernet
            extra_args: "--board=lptm4c1294ncpdt"
          - example: examples/Boards_GSM/TinyGSM_SIM800_SIM900
            extra_args: "--board=leonardo"
          - example: examples/Boards_USB_Serial/ATtiny85
            extra_args: "--board=attiny85"
          - example: examples/Boards_USB_Serial/Arduino_Serial_USB
            extra_args: "--board=uno"
          - example: examples/Boards_USB_Serial/Arduino_SoftwareSerial
            extra_args: "--board=uno"
          - example: examples/Boards_USB_Serial/Arduino_Zero_M0_Serial
            extra_args: "--board=zero"
          - example: examples/Boards_USB_Serial/Blue_Pill_STM32F103C
            extra_args: "--board=bluepill_f103c8 --project-option='framework=arduino'"
          - example: examples/Boards_USB_Serial/Digistump_Digispark
            extra_args: "--board=digispark-pro"
          - example: examples/Boards_USB_Serial/Energia_Serial_USB
            extra_args: "--board=lplm4f120h5qr"
          - example: examples/Boards_USB_Serial/Teensy3
            extra_args: "--board=teensy31"
          - example: examples/Boards_USB_Serial/chipKIT_Uno32
            extra_args: "--board=uno_pic32"
          - example: examples/Boards_WiFi/Adafruit_Feather_M0_WiFi
            extra_args: "--board=adafruit_feather_m0 --project-option='lib_deps=SPI, WiFi101'"
          - example: examples/Boards_WiFi/Arduino_MKR1000
            extra_args: "--board=mkr1000USB --project-option='lib_deps=WiFi101'"
          - example: examples/Boards_WiFi/Arduino_WiFi_Shield
            extra_args: "--board=uno"
          - example: examples/Boards_WiFi/Arduino_WiFi_Shield_101
            extra_args: "--board=uno --project-option='lib_deps=WiFi101'"
          - example: examples/Boards_WiFi/Arduino_Yun
            extra_args: "--board=yun"
          - example: examples/Boards_WiFi/Arduino_org_UNO_WiFi
            extra_args: "--board=uno --project-option='lib_deps=WiFi Link' --project-option='build_flags=-DESP_CH_SPI'"
          - example: examples/Boards_WiFi/CC3000
            extra_args: "--board=uno --project-option='lib_deps=Adafruit CC3000 Library'"
          - example: examples/Boards_WiFi/ESP32_WiFi
            extra_args: "--board=esp32dev --project-option='framework=arduino'"
          - example: examples/Boards_WiFi/ESP8266_Shield
            extra_args: "--board=megaatmega2560"
          - example: examples/Boards_WiFi/ESP8266_Standalone
            extra_args: "--board=nodemcuv2"
          - example: examples/Boards_WiFi/ESP8266_Standalone_Manual_IP
            extra_args: "--board=nodemcuv2"
          - example: examples/Boards_WiFi/ESP8266_Standalone_SSL
            extra_args: "--board=nodemcuv2"
          - example: examples/Boards_WiFi/ESP8266_Standalone_SmartConfig
            extra_args: "--board=nodemcuv2"
          - example: examples/Boards_WiFi/NodeMCU
            extra_args: "--board=nodemcuv2"
          - example: examples/Boards_WiFi/RN_XV_WiFly
            extra_args: "--board=leonardo"
          - example: examples/Boards_WiFi/Sparkfun_Blynk_Board
            extra_args: "--board=nodemcuv2"
          - example: examples/Boards_WiFi/TinyDuino_WiFi
            extra_args: "--board=tinyduino --project-option='lib_deps=Adafruit CC3000 Library'"
          - example: examples/Boards_WiFi/WildFire_V3
            extra_args: "--board=wildfirev3 --project-option='lib_deps=WildFire-CC3000'"
          - example: examples/Boards_WiFi/WizFi310
            extra_args: "--board=uno --project-option='lib_deps=WizFi310'"
          - example: examples/Boards_With_HTTP_API/Arduino_Ethernet
            extra_args: "--board=uno"
          - example: examples/Boards_With_HTTP_API/Arduino_GSM
            extra_args: "--board=uno"
          - example: examples/Boards_With_HTTP_API/ESP8266
            extra_args: "--board=nodemcuv2"
          - example: examples/Boards_With_HTTP_API/SIM800_SIM900
            extra_args: "--board=leonardo"
          - example: examples/Blynk.Inject/Template_ESP8266
            extra_args: "--board=nodemcuv2 --project-option='build_flags=-DBOARD_LED_PIN_WS2812 -DUSE_TICKER'"
          - example: examples/Blynk.Inject/Template_ESP32
            extra_args: "--board=esp32dev --project-option='framework=arduino'"
          - example: examples/Blynk.Inject/Template_MKR1000
            extra_args: "--board=mkr1000USB --project-option='lib_deps=WiFi101' --project-option='build_flags=-DUSE_TIMER_FIVE'"
          - example: examples/Blynk.Inject/myPlant_ESP8266
            extra_args: "--board=nodemcuv2 --project-option='build_flags=-DBOARD_LED_PIN_WS2812 -DUSE_TICKER'"
          - example: examples/GettingStarted/BlynkBlink
            extra_args: "--board=uno"
          - example: examples/GettingStarted/GetData
            extra_args: "--board=uno"
          - example: examples/GettingStarted/PushData
            extra_args: "--board=uno"
          - example: examples/GettingStarted/PushDataOnRequest
            extra_args: "--board=uno"
          - example: examples/GettingStarted/Servo
            extra_args: "--board=uno"
          - example: examples/GettingStarted/VirtualPinRead
            extra_args: "--board=uno"
          - example: examples/GettingStarted/VirtualPinReply
            extra_args: "--board=uno"
          - example: examples/GettingStarted/VirtualPinWrite
            extra_args: "--board=uno"
          - example: examples/More/AppConnectedEvents
            extra_args: "--board=uno"
          - example: examples/More/ArduinoClient/Arduino_Ethernet
            extra_args: "--board=uno"
          - example: examples/More/ArduinoClient/ESP8266_WiFi
            extra_args: "--board=nodemcuv2"
          - example: examples/More/DHT11
            extra_args: "--board=uno --project-option='lib_deps=Adafruit Unified Sensor'"
          - example: examples/More/DirectConnect/ESP8266_AccessPoint
            extra_args: "--board=nodemcuv2"
          - example: examples/More/DirectConnect/ESP8266_Station
            extra_args: "--board=nodemcuv2"
          - example: examples/More/FormatString
            extra_args: "--board=uno"
          - example: examples/More/HandleDisconnect
            extra_args: "--board=nodemcuv2"
          - example: examples/More/NeoPixel
            extra_args: "--board=uno"
          - example: examples/More/PrintAllVirtual
            extra_args: "--board=uno"
          - example: examples/More/ServerAsDataStorage/ServerAsDataStorage_MultiValue
            extra_args: "--board=uno"
          - example: examples/More/ServerAsDataStorage/ServerAsDataStorage_SingleValue
            extra_args: "--board=uno"
          - example: examples/More/SetProperty/SetProperty_MultiValue
            extra_args: "--board=uno"
          - example: examples/More/SetProperty/SetProperty_SingleValue
            extra_args: "--board=uno"
          - example: examples/More/Stroboscope
            extra_args: "--board=uno"
          - example: examples/More/Sync/ButtonInterrupt
            extra_args: "--board=uno"
          - example: examples/More/Sync/ButtonPoll
            extra_args: "--board=uno"
          - example: examples/More/Sync/HardwareSyncStateFromApp
            extra_args: "--board=uno"
          - example: examples/More/Sync/SyncPhysicalButton
            extra_args: "--board=uno"
          - example: examples/Widgets/Bridge
            extra_args: "--board=uno"
          - example: examples/Widgets/Email
            extra_args: "--board=uno"
          - example: examples/Widgets/Eventor
            extra_args: "--board=uno"
          - example: examples/Widgets/GPS_Stream
            extra_args: "--board=uno"
          - example: examples/Widgets/JoystickTwoAxis
            extra_args: "--board=uno"
          - example: examples/Widgets/LCD/LCD_AdvancedMode
            extra_args: "--board=uno"
          - example: examples/Widgets/LCD/LCD_SimpleModePushing
            extra_args: "--board=uno"
          - example: examples/Widgets/LCD/LCD_SimpleModeReading
            extra_args: "--board=uno"
          - example: examples/Widgets/LED/LED_Blink
            extra_args: "--board=uno"
          - example: examples/Widgets/LED/LED_Color
            extra_args: "--board=uno"
          - example: examples/Widgets/LED/LED_Fade
            extra_args: "--board=uno"
          - example: examples/Widgets/LED/LED_StatusOfButton
            extra_args: "--board=uno"
          - example: examples/Widgets/Map
            extra_args: "--board=uno"
          - example: examples/Widgets/Menu
            extra_args: "--board=uno"
          - example: examples/Widgets/Player
            extra_args: "--board=uno"
          - example: examples/Widgets/PushNotification/PushNotification_Button
            extra_args: "--board=uno"
          - example: examples/Widgets/PushNotification/PushNotification_Interval
            extra_args: "--board=uno"
          - example: examples/Widgets/RTC
            extra_args: "--board=uno"
          - example: examples/Widgets/RTC_Advanced
            extra_args: "--board=uno"
          - example: examples/Widgets/Table/Table_Advanced
            extra_args: "--board=uno"
          - example: examples/Widgets/Table/Table_Simple
            extra_args: "--board=uno"
          - example: examples/Widgets/Terminal
            extra_args: "--board=uno"
          - example: examples/Widgets/TimeInput/AdvancedTimeInput
            extra_args: "--board=uno"
          - example: examples/Widgets/TimeInput/SimpleTimeInput
            extra_args: "--board=uno"
          - example: examples/Widgets/TimeInput/UpdateTimeInputState
            extra_args: "--board=uno"
          - example: examples/Widgets/Timer
            extra_args: "--board=uno"
          - example: examples/Widgets/Twitter
            extra_args: "--board=uno"
          - example: examples/Widgets/WebHook/WebHook_GET
            extra_args: "--board=uno"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Install PlatformIO libraries
        run: |
          pio pkg install -g -l "adafruit/Adafruit NeoPixel"
          pio pkg install -g -l "adafruit/Adafruit Unified Sensor"
          pio pkg install -g -l "ntruchsess/UIPEthernet"
          pio pkg install -g -l "wickeddevice/WildFireCore"
          pio pkg install -g -l "harlequin-tech/WiFlyHQ"
          pio pkg install -g -l "paulstoffregen/Time"
          pio pkg install -g -l "adafruit/DHT sensor library"
          pio pkg install -g -l "sandeepmistry/BLEPeripheral"
          pio pkg install -g -l "adafruit/Adafruit BluefruitLE nRF51"
          pio pkg install -g -l "cmaglie/FlashStorage"
          pio pkg install -g -l "michael71/Timer5"
          pio pkg install -g -l "vshymanskyy/TinyGSM"
          pio pkg install -g -l "arduino-libraries/WiFi"
          pio pkg install -g -l "arduino-libraries/GSM"
          pio pkg install -g -l "arduino-libraries/Ethernet"
          pio pkg install -g -l "arduino-libraries/Servo"
          pio pkg install -g -l "sumotoy/simplyEncoder"
          pio pkg install -g -l "https://github.com/vshymanskyy/BlynkESP8266.git"

      - name: Build PlatformIO example
        run: pio ci --lib=. ${{ matrix.extra_args }}
        env:
          PLATFORMIO_CI_SRC: ${{ matrix.example }}

  linux:
    name: Linux build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Linux target
        run: make -C linux
